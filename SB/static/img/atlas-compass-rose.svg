<svg width="400" height="400" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Atlas — The Compass Rose -->
  <!-- Outer ring -->
  <circle cx="110" cy="110" r="105" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.3"/>
  <circle cx="110" cy="110" r="95" fill="none" stroke="#D4A843" stroke-width="0.5" opacity="0.2"/>

  <!-- Cardinal tick marks -->
  <g stroke="#D4A843" stroke-width="1" opacity="0.4">
    <line x1="110" y1="8" x2="110" y2="20"/>
    <line x1="110" y1="200" x2="110" y2="212"/>
    <line x1="8" y1="110" x2="20" y2="110"/>
    <line x1="200" y1="110" x2="212" y2="110"/>
  </g>

  <!-- Ordinal tick marks -->
  <g stroke="#D4A843" stroke-width="0.5" opacity="0.2">
    <line x1="38" y1="38" x2="46" y2="46"/>
    <line x1="182" y1="38" x2="174" y2="46"/>
    <line x1="38" y1="182" x2="46" y2="174"/>
    <line x1="182" y1="182" x2="174" y2="174"/>
  </g>

  <!-- Compass rose points -->
  <!-- North (prominent gold) -->
  <polygon points="110,22 120,90 110,80 100,90" fill="#D4A843" opacity="0.9"/>
  <!-- South -->
  <polygon points="110,198 120,130 110,140 100,130" fill="#D4A843" opacity="0.3"/>
  <!-- East -->
  <polygon points="198,110 130,100 140,110 130,120" fill="#D4A843" opacity="0.3"/>
  <!-- West -->
  <polygon points="22,110 90,100 80,110 90,120" fill="#D4A843" opacity="0.3"/>

  <!-- Inner decorative ring -->
  <circle cx="110" cy="110" r="60" fill="none" stroke="#D4A843" stroke-width="0.5" opacity="0.15"/>

  <!-- Center -->
  <circle cx="110" cy="110" r="6" fill="#D4A843" opacity="0.6"/>
  <circle cx="110" cy="110" r="3" fill="#F5EFE0"/>

  <!-- Cardinal letters -->
  <text x="110" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#D4A843" letter-spacing="2" opacity="0.7">N</text>
  <text x="110" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#D4A843" letter-spacing="2" opacity="0.35">S</text>
  <text x="185" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#D4A843" letter-spacing="2" opacity="0.35">E</text>
  <text x="35" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#D4A843" letter-spacing="2" opacity="0.35">W</text>
</svg>
