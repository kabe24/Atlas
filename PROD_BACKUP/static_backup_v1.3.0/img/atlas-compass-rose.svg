<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gold gradient for the north needle -->
    <linearGradient id="goldNeedle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4CE6A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922F"/>
    </linearGradient>
    <!-- Subtle shadow for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0B1D3A" flood-opacity="0.3"/>
    </filter>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E4D8C"/>
      <stop offset="100%" stop-color="#14305A"/>
    </linearGradient>
  </defs>

  <!-- Outer circle ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#1E4D8C" stroke-width="0.5" opacity="0.5"/>

  <!-- Degree tick marks (every 30 degrees) -->
  <g stroke="#1E4D8C" stroke-width="1.5" opacity="0.4">
    <line x1="100" y1="8" x2="100" y2="16"/>
    <line x1="100" y1="184" x2="100" y2="192"/>
    <line x1="8" y1="100" x2="16" y2="100"/>
    <line x1="184" y1="100" x2="192" y2="100"/>
  </g>
  <g stroke="#1E4D8C" stroke-width="0.8" opacity="0.3">
    <line x1="146.4" y1="13.6" x2="142.2" y2="20.8"/>
    <line x1="186.4" y1="53.6" x2="179.2" y2="57.8"/>
    <line x1="186.4" y1="146.4" x2="179.2" y2="142.2"/>
    <line x1="146.4" y1="186.4" x2="142.2" y2="179.2"/>
    <line x1="53.6" y1="186.4" x2="57.8" y2="179.2"/>
    <line x1="13.6" y1="146.4" x2="20.8" y2="142.2"/>
    <line x1="13.6" y1="53.6" x2="20.8" y2="57.8"/>
    <line x1="53.6" y1="13.6" x2="57.8" y2="20.8"/>
  </g>

  <!-- Cardinal direction labels -->
  <text x="100" y="30" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="700" fill="#D4A843" letter-spacing="1">N</text>
  <text x="100" y="178" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="10" font-weight="500" fill="#6B7B8D" letter-spacing="1">S</text>
  <text x="24" y="104" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="10" font-weight="500" fill="#6B7B8D" letter-spacing="1">W</text>
  <text x="176" y="104" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="10" font-weight="500" fill="#6B7B8D" letter-spacing="1">E</text>

  <!-- Intercardinal thin lines -->
  <g stroke="#1E4D8C" stroke-width="0.5" opacity="0.25">
    <line x1="100" y1="40" x2="100" y2="160"/>
    <line x1="40" y1="100" x2="160" y2="100"/>
    <line x1="57" y1="57" x2="143" y2="143"/>
    <line x1="143" y1="57" x2="57" y2="143"/>
  </g>

  <!-- Compass rose points - intercardinals (subdued) -->
  <g filter="url(#softShadow)">
    <!-- NE point -->
    <polygon points="100,100 115,85 135,65" fill="#14305A" opacity="0.6"/>
    <polygon points="100,100 85,85 65,65" fill="#14305A" opacity="0.4"/>
    <!-- SE point -->
    <polygon points="100,100 115,115 135,135" fill="#14305A" opacity="0.4"/>
    <polygon points="100,100 85,115 65,135" fill="#14305A" opacity="0.6"/>
    <!-- (mirror pairs create the 8-point star effect) -->

    <!-- East point (subdued) -->
    <polygon points="100,94 155,100 100,106" fill="#14305A" opacity="0.5"/>
    <!-- West point (subdued) -->
    <polygon points="100,94 45,100 100,106" fill="#14305A" opacity="0.5"/>
    <!-- South point (subdued) -->
    <polygon points="94,100 100,155 106,100" fill="#14305A" opacity="0.5"/>

    <!-- North point - GOLD (prominent) -->
    <polygon points="94,100 100,38 100,100" fill="url(#goldNeedle)"/>
    <polygon points="106,100 100,38 100,100" fill="#B8922F"/>
  </g>

  <!-- Center circle -->
  <circle cx="100" cy="100" r="8" fill="#14305A" stroke="#D4A843" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="3" fill="#D4A843"/>
</svg>
